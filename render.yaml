databases:
  - name: p5store-db
    plan: free
    databaseName: p5store
    user: p5store

services:
  - type: web
    name: p5store-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: APP_JWT_SECRET
        generateValue: true
      - key: APP_ADMIN_EMAIL
        value: admin@pillar5.co.za
      - key: APP_ADMIN_PASSWORD
        sync: false
      - key: APP_CORS_ALLOWED_ORIGINS
        value: https://p5store-storefront.onrender.com,https://p5store-admin.onrender.com
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: R2_PUBLIC_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: APP_FRONTEND_URL
        value: https://p5store-storefront.onrender.com
      - key: DB_HOST
        fromDatabase:
          name: p5store-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: p5store-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: p5store-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: p5store-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: p5store-db
          property: password
