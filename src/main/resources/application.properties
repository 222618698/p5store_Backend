# --- Local dev: H2 in-memory DB (data resets on every restart) ---
# Production (Render) uses PostgreSQL instead — see application-prod.properties,
# activated via the SPRING_PROFILES_ACTIVE=prod env var set in render.yaml.
spring.datasource.url=jdbc:h2:mem:p5store;MODE=MySQL;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA and Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Server Configuration
server.servlet.context-path=/store
server.port=${PORT:8080}

# Seeded admin account (override via APP_ADMIN_EMAIL / APP_ADMIN_PASSWORD env vars in production)
app.admin.email=admin@pillar5.co.za
app.admin.password=admin

# File uploads
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Cloudflare R2 (S3-compatible) object storage for uploaded images — set via
# env vars in production. Local dev without these configured will simply
# fail on upload attempts (nothing else is affected, since the client bean
# is lazy — see R2Config).
r2.account-id=${R2_ACCOUNT_ID:}
r2.access-key-id=${R2_ACCESS_KEY_ID:}
r2.secret-access-key=${R2_SECRET_ACCESS_KEY:}
r2.bucket-name=${R2_BUCKET_NAME:}
r2.public-url=${R2_PUBLIC_URL:}

# Password-reset emails via Resend (set via env vars in production). Local
# dev without these configured will fail only when forgot-password is
# actually used — nothing else is affected.
resend.api-key=${RESEND_API_KEY:}
resend.from-email=${RESEND_FROM_EMAIL:}

# Public URL of the storefront, used to build password-reset links in emails
app.frontend-url=${APP_FRONTEND_URL:http://localhost:5174}

# One-time catalog import source (see CatalogImportService / POST /v1/admin/catalog-import)
app.catalog-import.url=${APP_CATALOG_IMPORT_URL:}

# PayPal REST API (Orders v2). Storefront prices are in ZAR; PayPal orders
# are created in USD (paypal.currency) converted at a fixed rate, matching
# how this merchant's PayPal gateway was configured previously.
paypal.client-id=${PAYPAL_CLIENT_ID:}
paypal.client-secret=${PAYPAL_CLIENT_SECRET:}
paypal.api-base=${PAYPAL_API_BASE:https://api-m.paypal.com}
paypal.currency=${PAYPAL_CURRENCY:USD}
paypal.zar-to-usd-rate=${PAYPAL_ZAR_TO_USD_RATE:0.054054}

# JWT Configuration
app.jwt.secret=p5storeSecretKeyChangeInProductionMustBe256BitsLong
app.jwt.expiration-ms=86400000

# CORS Configuration
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://localhost:5174

# Logging
logging.level.com.p5store=DEBUG
logging.level.org.springframework.security=WARN
