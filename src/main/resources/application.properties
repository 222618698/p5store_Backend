# --- Local dev: H2 in-memory DB (data resets on every restart) ---
spring.datasource.url=jdbc:h2:mem:p5store;MODE=MySQL;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- MySQL Database Configuration (production / original) ---
# spring.datasource.url=jdbc:mysql://localhost:3306/african_arts_Store?createDatabaseIfNotExist=true
# spring.datasource.username=root
# spring.datasource.password=password
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# JPA and Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Server Configuration
server.servlet.context-path=/store

# File uploads (local disk storage — see ProductController#uploadImage)
app.upload.dir=uploads
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# JWT Configuration
app.jwt.secret=p5storeSecretKeyChangeInProductionMustBe256BitsLong
app.jwt.expiration-ms=86400000

# CORS Configuration
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://localhost:5174

# Logging
logging.level.com.p5store=DEBUG
logging.level.org.springframework.security=WARN
